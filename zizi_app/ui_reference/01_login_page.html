<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#fef3c7",
              "tertiary": "#00677d",
              "surface-container-highest": "#e9e2d1",
              "outline": "#7e7761",
              "secondary-fixed": "#f5e29a",
              "on-tertiary": "#ffffff",
              "on-error-container": "#93000a",
              "on-surface": "#0f172a",
              "on-error": "#ffffff",
              "surface": "#f8f8f6",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed-variant": "#534600",
              "on-secondary-fixed": "#221b00",
              "on-tertiary-container": "#006075",
              "on-background": "#0f172a",
              "primary-fixed-dim": "#e5c521",
              "inverse-surface": "#343025",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#d8c681",
              "surface-container-low": "#ffffff",
              "inverse-on-surface": "#f8f0df",
              "primary-fixed": "#ffe262",
              "on-secondary-fixed-variant": "#52460d",
              "secondary": "#f59e0b",
              "on-primary-container": "#854d0e",
              "on-secondary-container": "#92400e",
              "primary": "#eecd2b",
              "on-primary-fixed": "#221b00",
              "on-tertiary-fixed": "#001f27",
              "outline-variant": "#eecd2b4d",
              "on-tertiary-fixed-variant": "#004e5f",
              "on-surface-variant": "#4c4733",
              "on-secondary": "#ffffff",
              "tertiary-container": "#6bddff",
              "background": "#f8f8f6",
              "error-container": "#ffdad6",
              "error": "#ba1a1a",
              "surface-variant": "#e9e2d1",
              "surface-dim": "#e1d9c9",
              "primary-container": "#fef9c3",
              "surface-tint": "#6f5d00",
              "surface-container-high": "#efe8d7",
              "tertiary-fixed-dim": "#62d5f6",
              "surface-container": "#f5eddc",
              "inverse-primary": "#e5c521",
              "tertiary-fixed": "#b3ebff",
              "surface-bright": "#ffffff"
            },
            fontFamily: {
              "headline": ["Be Vietnam Pro"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .inset-soft-shadow {
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gradient-to-br from-surface to-secondary-container min-h-screen font-body text-on-surface selection:bg-primary/30">
<!-- Auth Layout Wrapper -->
<main class="relative flex flex-col items-center justify-center min-h-screen px-6 py-12 overflow-hidden">
<!-- Hero Mascot Section -->
<div class="relative w-64 h-64 mb-12 flex items-center justify-center">
<!-- Decorative Glow Background -->
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full"></div>
<!-- Pure CSS Mascot (Zizi) -->
<div class="relative z-10">
<!-- Main Face -->
<div class="w-48 h-48 bg-primary rounded-full shadow-lg border-b-4 border-on-primary-container/10 flex flex-col items-center justify-center relative">
<!-- Eyes Container -->
<div class="flex space-x-12 mb-4">
<div class="w-4 h-5 bg-on-primary-fixed rounded-full"></div>
<div class="w-4 h-5 bg-on-primary-fixed rounded-full"></div>
</div>
<!-- Cheeks -->
<div class="absolute left-8 top-24 w-6 h-3 bg-[#ff9fb2] rounded-full blur-[1px] opacity-80"></div>
<div class="absolute right-8 top-24 w-6 h-3 bg-[#ff9fb2] rounded-full blur-[1px] opacity-80"></div>
<!-- Smile SVG -->
<svg class="mt-2" fill="none" height="20" viewbox="0 0 40 20" width="40" xmlns="http://www.w3.org/2000/svg">
<path d="M5 5C5 5 10 15 20 15C30 15 35 5 35 5" stroke="#534600" stroke-linecap="round" stroke-width="4"></path>
</svg>
</div>
<!-- Little Ears/Tufts -->
<div class="absolute -top-4 left-1/4 -translate-x-1/2 w-10 h-14 bg-primary rounded-full -rotate-12 border-b-4 border-on-primary-container/10"></div>
<div class="absolute -top-4 right-1/4 translate-x-1/2 w-10 h-14 bg-primary rounded-full rotate-12 border-b-4 border-on-primary-container/10"></div>
</div>
</div>
<!-- Headline Area -->
<div class="text-center mb-10">
<h1 class="font-headline font-black text-4xl text-on-primary-container tracking-tight italic">
                Zizi 2.0
            </h1>
<p class="text-on-surface-variant font-medium mt-2">
                探索奇妙的成长之旅
            </p>
</div>
<!-- Login Form Container -->
<div class="w-full max-w-md space-y-6">
<!-- Input: Phone -->
<div class="relative group">
<div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">person</span>
</div>
<input class="w-full h-16 pl-16 pr-6 bg-surface-container-lowest border-none rounded-3xl inset-soft-shadow focus:ring-4 focus:ring-primary/20 text-lg font-medium transition-all placeholder:text-outline/50" placeholder="请输入手机号" type="tel"/>
</div>
<!-- Input: Password -->
<div class="relative group">
<div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full h-16 pl-16 pr-6 bg-surface-container-lowest border-none rounded-3xl inset-soft-shadow focus:ring-4 focus:ring-primary/20 text-lg font-medium transition-all placeholder:text-outline/50" placeholder="请输入密码" type="password"/>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full h-16 bg-gradient-to-r from-secondary to-primary text-on-primary font-headline font-bold text-xl rounded-full shadow-lg shadow-secondary/30 border-b-4 border-on-secondary-container/20 active:scale-95 transition-all flex items-center justify-center gap-2">
<span>魔法开启 (登录)</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span>
</button>
</div>
<!-- Secondary Links -->
<div class="flex flex-col items-center space-y-4 pt-6">
<a class="text-on-secondary-container font-label text-sm font-bold tracking-wider hover:text-secondary transition-colors" href="#">
                    没有账号？去注册
                </a>
<a class="text-outline font-label text-xs font-medium hover:text-on-surface transition-colors" href="#">
                    忘记密码了？
                </a>
</div>
</div>
<!-- Footer Decoration -->
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-12 -right-12 w-48 h-48 bg-secondary/10 rounded-full blur-3xl"></div>
</main>
<!-- Visual Polish: Soft Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')]"></div>
</body></html>
