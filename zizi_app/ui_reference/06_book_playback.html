<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;family=Noto+Sans+SC:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#eecd2b",
                        "background-light": "#f8f8f6",
                        "background-dark": "#221f10",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "Noto Sans SC", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .gradient-play {
            background: linear-gradient(135deg, #a7f3d0 0%, #7dd3fc 100%);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<header class="relative z-20 flex items-center justify-between p-6 pt-8">
<button class="flex items-center justify-center size-12 rounded-full bg-white shadow-lg text-slate-800 hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="flex-1 text-center text-2xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">
                我的魔法冒险
            </h1>
<div class="size-12"></div> <!-- Spacer for centering -->
</header>
<!-- Magic Swiper (Carousel Area) -->
<main class="flex-1 flex items-center justify-center overflow-hidden">
<div class="flex items-center gap-6 px-10 overflow-x-auto hide-scrollbar snap-x snap-mandatory w-full h-full pb-20">
<!-- Previous Page (Partial) -->
<div class="shrink-0 w-64 h-[60vh] opacity-40 scale-90 blur-[2px] rounded-xl overflow-hidden snap-center">
<div class="w-full h-full bg-cover bg-center" data-alt="Abstract colorful magical landscape with trees" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCB9J7YCWNw5DViS3bDda9tl0BJgPE6I1uxXFXEmI5I5HbCZlTqM7MV4mQ_5wS0k8qO5yFYoyH79Hbk7SaCXTARCUojakKAXkEkKPMhAEaCp2_UpN9G7T4avhrVLQITz0aMhsXsjQnieXjoBuLm2ogA-uosB7XPWG1WGOUVhuzGJf2EouS2LINhsn1Lu50Oi2oKZEbuGAGswY7qLNBqxXEogpW8Xzm8dXEFKVgKEipXEEgzGGCFviy_R3w-Zb-pYSdBK5nvi46vCH8')"></div>
</div>
<!-- Active Page -->
<div class="shrink-0 w-[80vw] max-w-[400px] h-[70vh] scale-110 rounded-xl shadow-2xl overflow-hidden snap-center border-4 border-white/50 relative">
<div class="w-full h-full bg-cover bg-center" data-alt="A magical forest with a friendly dragon illustration" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAsX6H1oP3NeYwn_d701ZhPf-zDbKgf8FkDcjU634gT9_TE7uUHxinG7oNxPfTC4BD68AWZAG5lm8kv_-LCkriWbOs70SN4Lt7dggwhmCOt0TRNJIRvCYdFrF17QT5lzYoA7E053nqSz-dL47zpmyoDOU8CENaw3LkbWaxFF_qoHYUeEO-1rHh0HFxy-2Y_K6Pzx4OduFEN42tvBTnM4-2WnUO3_yFuTwLJXs8E4WybODh2tBAZCJzOq-52IdhO6lb_dQ6UlUJSv_s')"></div>
<!-- Overlay Controls on First Page -->
<div class="absolute inset-x-0 bottom-8 flex flex-col items-center gap-4 px-6">
<div class="flex gap-4 w-full">
<button class="flex-1 flex items-center justify-center gap-2 h-14 glass-effect rounded-full shadow-lg text-slate-800 font-bold hover:bg-white transition-colors">
<span class="material-symbols-outlined">swipe_right</span>
<span class="text-sm">滑动播放</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 h-14 gradient-play rounded-full shadow-lg text-slate-800 font-bold hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined">play_circle</span>
<span class="text-sm">自动连播</span>
</button>
</div>
</div>
</div>
<!-- Next Page (Partial) -->
<div class="shrink-0 w-64 h-[60vh] opacity-40 scale-90 blur-[2px] rounded-xl overflow-hidden snap-center">
<div class="w-full h-full bg-cover bg-center" data-alt="Dreamy castle in the clouds illustration" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBYz42q-edYrmBw8estsc-XGgeWgL4sqjulHvT2Bojdw1baTsTCsZP_k_pJudE1PWH3o-3TSglS0FlEfjjRUY2HGClifKQVWGvkVWSs-mSFBTHjjSm1JyQA8XBEY7rOxbk79ggRcdy4ENvK_Zji1txvhliGLVDcOw6lm6_6b8U1lhn1lFK4mMccbQ2kkvqp8DwstGtvu7bU8-9H-8vkNt9upZ0muDIjAupOVWz028NTluvKquP1hBantIy5xO7kpyBHgHqM7GtnZOM')"></div>
</div>
</div>
</main>
<!-- Immersion Controls (Bottom) -->
<footer class="absolute bottom-10 inset-x-0 flex flex-col items-center gap-8 z-30">
<!-- Progress Indicator: Seeds/Sparkles -->
<div class="flex items-center gap-3">
<div class="size-2 rounded-full bg-primary/30"></div>
<div class="size-2 rounded-full bg-primary/30"></div>
<div class="size-4 rounded-full bg-primary shadow-[0_0_15px_rgba(238,205,43,0.8)] ring-2 ring-white"></div>
<div class="size-2 rounded-full bg-primary/30"></div>
<div class="size-2 rounded-full bg-primary/30"></div>
<div class="size-2 rounded-full bg-primary/30"></div>
<div class="size-2 rounded-full bg-primary/30"></div>
</div>
<!-- Floating Pause/Play Bubble -->
<button class="flex items-center justify-center size-14 rounded-full glass-effect shadow-xl border border-white/40 text-slate-800 hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">pause</span>
</button>
</footer>
<!-- Background Decor -->
<div class="absolute top-0 left-0 w-full h-full -z-10 bg-background-light dark:bg-background-dark">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-200/20 rounded-full blur-[100px]"></div>
</div>
</div>
</body></html>
