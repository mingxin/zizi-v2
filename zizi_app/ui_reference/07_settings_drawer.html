<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-on-surface": "#f8f0df",
              "secondary-fixed": "#f5e29a",
              "on-error-container": "#93000a",
              "primary-fixed-dim": "#e5c521",
              "tertiary-fixed-dim": "#62d5f6",
              "surface-container-high": "#efe8d7",
              "outline-variant": "#eecd2b4d",
              "on-primary-fixed-variant": "#534600",
              "tertiary-fixed": "#b3ebff",
              "on-secondary": "#ffffff",
              "error": "#ba1a1a",
              "surface-bright": "#ffffff",
              "error-container": "#ffdad6",
              "on-error": "#ffffff",
              "surface-dim": "#e1d9c9",
              "on-tertiary-fixed-variant": "#004e5f",
              "outline": "#7e7761",
              "on-secondary-fixed-variant": "#52460d",
              "on-secondary-container": "#92400e",
              "on-tertiary": "#ffffff",
              "primary-container": "#fef9c3",
              "inverse-surface": "#343025",
              "secondary": "#f59e0b",
              "surface-container-highest": "#e9e2d1",
              "surface-tint": "#6f5d00",
              "tertiary": "#00677d",
              "surface-container": "#f5eddc",
              "on-tertiary-fixed": "#001f27",
              "on-primary-container": "#854d0e",
              "on-tertiary-container": "#006075",
              "tertiary-container": "#6bddff",
              "surface": "#f8f8f6",
              "on-primary-fixed": "#221b00",
              "secondary-container": "#fef3c7",
              "on-surface": "#0f172a",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#ffe262",
              "primary": "#eecd2b",
              "surface-variant": "#e9e2d1",
              "surface-container-low": "#ffffff",
              "on-primary": "#ffffff",
              "on-secondary-fixed": "#221b00",
              "inverse-primary": "#e5c521",
              "on-background": "#0f172a",
              "on-surface-variant": "#4c4733",
              "secondary-fixed-dim": "#d8c681",
              "background": "#f8f8f6"
            },
            fontFamily: {
              "headline": ["Be Vietnam Pro"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .inset-shadow-soft {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface overflow-hidden h-screen w-screen">
<!-- Background Content Mock (The screen behind the drawer) -->
<main class="fixed inset-0 p-8 flex flex-col items-center justify-center gap-6">
<div class="w-48 h-48 bg-primary rounded-xl shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-8xl text-white">child_care</span>
</div>
<h1 class="text-4xl font-black text-slate-800 tracking-tight">Zizi 2.0</h1>
<p class="text-slate-500 text-center max-w-xs">Start your learning adventure today with interactive stories and games!</p>
</main>
<!-- Drawer Component -->
<div class="fixed inset-0 z-50 flex justify-end">
<!-- Backdrop -->
<div class="absolute inset-0 bg-black/30 backdrop-blur-sm transition-opacity"></div>
<!-- Drawer Container (85% width) -->
<aside class="relative w-[85%] h-full bg-surface rounded-l-[3rem] shadow-2xl overflow-hidden flex flex-col transform transition-transform border-l-4 border-white/20">
<!-- Header Section -->
<header class="flex items-center justify-between px-8 pt-10 pb-6">
<button class="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-md active:scale-95 transition-all border-b-4 border-black/5">
<span class="material-symbols-outlined text-slate-600" data-icon="close">close</span>
</button>
<h2 class="text-2xl font-bold text-slate-800 tracking-tight font-headline">家长设置</h2>
<div class="w-12"></div> <!-- Spacer for centering -->
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-8 space-y-10 pb-32">
<!-- Section A: Vocabulary Level -->
<section class="space-y-4">
<div class="flex flex-col gap-1">
<h3 class="text-xl font-bold text-slate-800">字库难度</h3>
<p class="text-sm text-slate-500">选择宝宝的识字阶段</p>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Card 1: Inactive -->
<button class="bg-white p-5 rounded-2xl flex flex-col items-center justify-center gap-2 shadow-md border-b-4 border-slate-100 hover:scale-[1.02] active:scale-95 transition-all">
<span class="text-3xl font-black text-slate-300">L1</span>
<span class="text-xs font-bold text-slate-400 tracking-widest uppercase">基础级</span>
</button>
<!-- Card 2: Active (Sky Blue) -->
<button class="bg-tertiary-container p-5 rounded-2xl flex flex-col items-center justify-center gap-2 shadow-lg shadow-tertiary-container/40 border-b-4 border-tertiary/20 relative scale-105 ring-4 ring-white">
<span class="absolute top-2 right-2 material-symbols-outlined text-tertiary font-bold" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-3xl font-black text-on-tertiary-container">L2</span>
<span class="text-xs font-bold text-on-tertiary-container tracking-widest uppercase">进阶级</span>
</button>
<!-- Card 3: Inactive -->
<button class="bg-white p-5 rounded-2xl flex flex-col items-center justify-center gap-2 shadow-md border-b-4 border-slate-100 hover:scale-[1.02] active:scale-95 transition-all">
<span class="text-3xl font-black text-slate-300">L3</span>
<span class="text-xs font-bold text-slate-400 tracking-widest uppercase">挑战级</span>
</button>
<!-- Card 4: Inactive -->
<button class="bg-white p-5 rounded-2xl flex flex-col items-center justify-center gap-2 shadow-md border-b-4 border-slate-100 hover:scale-[1.02] active:scale-95 transition-all">
<span class="text-3xl font-black text-slate-300">L4</span>
<span class="text-xs font-bold text-slate-400 tracking-widest uppercase">大师级</span>
</button>
</div>
</section>
<!-- Section B: Voice Selection -->
<section class="space-y-4">
<div class="flex flex-col gap-1">
<h3 class="text-xl font-bold text-slate-800">讲故事的音色</h3>
<p class="text-sm text-slate-500">谁来给宝宝讲故事？</p>
</div>
<div class="flex flex-col gap-3">
<!-- Selected Voice -->
<button class="w-full bg-primary-container h-16 rounded-full px-6 flex items-center justify-between shadow-lg shadow-primary/20 border-b-4 border-primary/30 active:scale-[0.98] transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="face_3" style="font-variation-settings: 'FILL' 1;">face_3</span>
<span class="font-bold text-on-primary-container">温柔妈妈</span>
</div>
<span class="material-symbols-outlined text-primary" data-icon="volume_up">volume_up</span>
</button>
<!-- Subdued Voice -->
<button class="w-full bg-white h-16 rounded-full px-6 flex items-center justify-between shadow-md border-b-4 border-slate-100 active:scale-[0.98] transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400 text-2xl" data-icon="face_5">face_5</span>
<span class="font-bold text-slate-500">可爱童声</span>
</div>
<span class="material-symbols-outlined text-slate-300" data-icon="volume_up">volume_up</span>
</button>
</div>
</section>
<!-- Section C: Advanced / API -->
<section class="space-y-4">
<div class="flex items-center gap-2">
<div class="flex flex-col gap-1">
<h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                                高级配置 / API
                                <span class="material-symbols-outlined text-slate-400 text-lg" data-icon="lock">lock</span>
</h3>
<p class="text-sm text-slate-500">私有大模型配置</p>
</div>
</div>
<div class="space-y-4">
<div class="group">
<label class="block text-xs font-black text-slate-400 tracking-widest uppercase ml-4 mb-2">LLM API KEY</label>
<input class="w-full h-16 bg-white rounded-3xl px-6 border-none ring-2 ring-transparent focus:ring-primary shadow-sm inset-shadow-soft text-slate-700 placeholder:text-slate-300 font-medium" placeholder="sk-••••••••••••••••" type="password"/>
</div>
<div class="group">
<label class="block text-xs font-black text-slate-400 tracking-widest uppercase ml-4 mb-2">TTS API KEY</label>
<input class="w-full h-16 bg-white rounded-3xl px-6 border-none ring-2 ring-transparent focus:ring-primary shadow-sm inset-shadow-soft text-slate-700 placeholder:text-slate-300 font-medium" placeholder="Enter service key..." type="text"/>
</div>
</div>
</section>
<!-- Decorative Illustration Space -->
<div class="flex justify-center py-6 opacity-30 grayscale contrast-125">
<span class="material-symbols-outlined text-9xl text-slate-400" data-icon="auto_awesome">auto_awesome</span>
</div>
</div>
<!-- Footer Section -->
<footer class="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-white via-white to-transparent pt-12">
<button class="w-full h-16 bg-gradient-to-r from-primary to-secondary rounded-full flex items-center justify-center gap-3 shadow-xl shadow-primary/40 border-b-4 border-orange-600/20 active:scale-95 transition-all group">
<span class="material-symbols-outlined text-white text-2xl group-hover:rotate-12 transition-transform" data-icon="auto_stars">stars</span>
<span class="text-xl font-black text-white tracking-wide">保存设置</span>
</button>
</footer>
</aside>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden pointer-events-none opacity-20">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary rounded-full blur-[100px]"></div>
<div class="absolute top-1/2 left-1/4 w-64 h-64 bg-tertiary rounded-full blur-[100px]"></div>
</div>
</body></html>
